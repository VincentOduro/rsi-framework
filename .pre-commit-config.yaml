repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        # Only type-check the strict-scope files. The rest of scripts/ is
        # deferred to Phase E6 hardening follow-ups.
        files: ^(engine/|scripts/rsi\.py$)
        additional_dependencies:
          - pydantic>=2.0

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

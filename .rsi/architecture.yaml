# .rsi/architecture.yaml
# Per-project file sensitivity classification and role definitions.
# Installed on first setup. User customizes patterns for their project.

version: "1.0"

roles:
  overlord:
    model: "claude-opus"
    adapter: "claude"
    description: "Architect, reviewer, decision-maker, task router"
    permissions:
      - read_all
      - write_all
      - review
      - delegate

  worker_minimax:
    model: "MiniMax-M2.7"
    adapter: "opencode"
    env_key: "MINIMAX_API_KEY"
    description: "Bulk generation, long-context tasks, multi-file refactors"
    strengths:
      - "1M token context — ideal for whole-codebase analysis"
      - "High throughput for large parallel batches"
      - "Multi-file refactors and bulk code generation"
      - "Tasks where sheer context size matters most"
    permissions:
      - read_all
      - write_open
      - write_guarded    # requires review before merge

  worker_kimi:
    model: "moonshot-v1-128k"
    adapter: "opencode"
    env_key: "KIMI_API_KEY"
    description: "Targeted edits, precise reasoning, API-sensitive tasks"
    strengths:
      - "Strong precise reasoning for targeted single-file changes"
      - "Accurate symbol resolution and API-sensitive implementations"
      - "Test writing and bug fixes requiring focused analysis"
      - "Tasks where reasoning quality matters more than context size"
    permissions:
      - read_all
      - write_open
      - write_guarded    # requires review before merge

# File sensitivity classification
# Uses glob patterns. First match wins. More specific patterns go first.
file_sensitivity:
  constitution:
    description: "Only overlord can modify. Framework-critical files."
    patterns:
      - "CLAUDE.md"
      - "FRAMEWORK.md"
      - "TOYOTA_PRINCIPLES.md"
      - ".rsi/**"
      - "scripts/hooks.py"
      - "scripts/delegate.py"
      # Project-specific — add your own:
      # - "src/core/interfaces/**"
      # - "config/production.*"

  guarded:
    description: "Worker can modify, overlord must review before merge."
    patterns:
      - "scripts/*.py"
      - "adapters/**"
      # Project-specific — add your own:
      # - "src/core/**"
      # - "migrations/**"

  open:
    description: "Worker can freely modify. No review gate."
    patterns:
      - "tests/**"
      - "docs/**"
      - "*.md"
      # Project-specific — add your own:
      # - "src/adapters/**"
      # - "src/utils/**"

# Delegation settings
delegation:
  max_revision_cycles: 3
  require_dry_run: true
  require_proof_wrong: true
  auto_apply_open_files: false

# Pre-commit hook strictness (U4 — retrospective §3.4)
#
#   preflight_only — session check + file-read preflight + src/ self_verify
#                    + script syntax. Current behavior; fastest path.
#   verify_warn    — preflight_only plus a ceremony-classifier health probe.
#                    Failures emit a WARNING but do not block the commit.
#                    (Default. Surfaces ceremony-module breakage without
#                     halting project work.)
#   verify_strict  — same probe as verify_warn but failures exit 1.
#                    Opt in once ceremony modules are stable in your project.
pre_commit_strictness: "verify_warn"

# API configuration (env vars override these)
# worker_api: default worker (backward compat — used when --worker not specified)
worker_api:
  provider: "minimax"
  base_url: "https://api.minimaxi.chat/v1"
  model: "MiniMax-M2.7"
  max_tokens: 32768
  timeout_seconds: 120
  env_key: "MINIMAX_API_KEY"

# Named workers — select with: python3 scripts/delegate.py --worker <name> ...
#
# Per-worker fields (defaults apply when omitted):
#   temperature              — sampling temperature passed to chat.completions.create
#                              (default 0.3 — safe for MiniMax; Kimi non-thinking requires 0.6,
#                              thinking mode requires 1.0)
#   max_output_lines         — pre-flight warning threshold for files_to_modify line count
#                              (default 500 — MiniMax 16K-token safety; Kimi K2.6 handles 2000+)
#   client_timeout_seconds   — OpenAI SDK request timeout (default 600; the SDK's own
#                              default). Reasoning workers in thinking mode may need 1800+.
#                              Legacy `timeout_seconds` accepted as fallback.
#   max_retries              — OpenAI SDK retry count on transient errors (default 2).
#   extra_body               — vendor-specific create() parameters (YAML flow-style dict).
#                              Example: {"thinking": {"type": "disabled"}} for Kimi K2.6.
#   output_format_preference — "json" / "delimiter" / "either" (default either).
#                              Governs parser ordering only — the fallback parser
#                              still runs so no billed output is lost to a mismatch.
#   top_p                    — nucleus sampling parameter (default 1.0 per SDK).
#                              Kimi K2.6 vendor recommends 0.95 for both modes.
#   max_concurrency          — per-API-key in-flight call cap (default 10).
#                              delegate_parallel builds one semaphore per env_key
#                              and pool size = sum of available workers' caps.
#                              Workers sharing an env_key share the same slot
#                              budget (the larger cap wins). Tuned defaults:
#                              minimax 20 (E7-measured), kimi 5 (thinking is
#                              slow), kimi-instant 10. Override only if vendor
#                              rate-limits surface as 429s.
#   capability               — "text" (default) or "image". text → call_worker
#                              uses chat.completions and expects JSON-with-
#                              changes. image → call_image_worker POSTs to
#                              image_endpoint and writes binary outputs
#                              listed in TaskSpec.image_outputs.
#   image_endpoint           — path appended to base_url for image workers
#                              (default "/image_generation"). Ignored when
#                              capability != "image".
workers:
  minimax:
    provider: "minimax"
    base_url: "https://api.minimaxi.chat/v1"
    model: "MiniMax-M2.7"
    max_tokens: 32768
    max_concurrency: 20
    # Legacy server-side hint; preserved for backward compatibility.
    # NB: prior to Session 3 this field was parsed but not wired into the
    # OpenAI client. Session 3's WorkerProfile uses it as a fallback for
    # client_timeout_seconds when the explicit field is absent.
    timeout_seconds: 120
    # Explicit client-side SDK timeout. M2.7's observed p99 dispatch latency
    # is ~40s; 600s leaves a ~15× safety margin without letting a runaway
    # call stall the pipeline indefinitely. Set explicitly so the legacy
    # 120s timeout_seconds doesn't silently become the client budget.
    client_timeout_seconds: 600
    temperature: 0.3
    # Recalibrated from the retrospective's 500 default (which was sized for
    # MiniMax-M1's 16K output budget). M2.7 has 32K max_tokens; 1500 gives
    # roughly 3× the M1-era headroom with room for prompt, JSON wrapper,
    # and reasoning overhead. Session 1's U1 (587-line self_verify.py)
    # would have dispatched cleanly under this cap.
    max_output_lines: 1500
    env_key: "MINIMAX_API_KEY"
  kimi:
    provider: "kimi"
    # International Moonshot endpoint — the .cn endpoint rejects keys
    # provisioned for the .ai region with HTTP 401.
    base_url: "https://api.moonshot.ai/v1"
    # Kimi K2.6 — latest Moonshot reasoning model (as of 2026-04).
    model: "kimi-k2.6"
    # Thinking mode is ON by default for the primary kimi worker. Kimi's
    # primary RSI use case is code production (algorithm implementation,
    # logic changes, test authoring), which benefits materially from the
    # model's chain-of-thought reasoning before emitting output.
    #
    # Thinking mode constraints:
    # - temperature MUST be 1.0 (vendor-enforced; 0.6 raises 400 error)
    # - completion_tokens budget is shared between reasoning_content and
    #   content, so we double max_tokens vs instant mode to give reasoning
    #   + output enough headroom without hitting finish_reason=length
    # - reasoning_content is captured by delegate.py to a sidecar at
    #   .memory/reviews/results/TASK-{ID}.reasoning.txt (F6-style)
    #
    # For surgical-edit / pure-deletion tasks where thinking is wasteful
    # (byte-preservation discipline can't benefit from reasoning, and
    # reasoning tokens are pure overhead), route to `kimi-instant` below.
    temperature: 1.0
    # top_p 0.95 is Moonshot's recommended value across both modes.
    top_p: 0.95
    max_tokens: 65536
    max_output_lines: 2000
    timeout_seconds: 120
    client_timeout_seconds: 1800
    max_retries: 3
    max_concurrency: 5
    extra_body: {"thinking": {"type": "enabled"}}
    env_key: "KIMI_API_KEY"

  kimi-instant:
    provider: "kimi"
    base_url: "https://api.moonshot.ai/v1"
    model: "kimi-k2.6"
    # Instant mode — thinking disabled. Use for surgical-edit and
    # pure-deletion task categories where the per-dispatch task-category
    # table in review-memo-base.md flags Kimi as "Mixed" / "Risky": no
    # amount of chain-of-thought helps with byte-preservation, and
    # reasoning tokens are pure overhead. Also useful for small logic
    # fixes where the model doesn't need to deliberate.
    #
    # Constraints (mirror of kimi but inverted):
    # - temperature MUST be 0.6 when thinking is disabled
    # - No reasoning_content in response (nothing to sidecar)
    temperature: 0.6
    top_p: 0.95
    max_tokens: 32768
    max_output_lines: 2000
    timeout_seconds: 120
    client_timeout_seconds: 1800
    max_retries: 3
    max_concurrency: 10
    extra_body: {"thinking": {"type": "disabled"}}
    env_key: "KIMI_API_KEY"

  # Image-generation worker. Routed to when TaskSpec.task_kind == "image".
  # Endpoint is NOT OpenAI-compatible — delegate.call_image_worker bypasses
  # the OpenAI SDK and POSTs to {base_url}{image_endpoint} with native shape.
  # Vendor returns presigned OSS URLs (Expires ~30 days); the worker
  # downloads each URL synchronously into the paths listed in
  # TaskSpec.image_outputs before returning. max_concurrency is conservative
  # (5) because image gen is ~16s per call and download adds I/O.
  minimax-image:
    provider: "minimax"
    base_url: "https://api.minimaxi.chat/v1"
    capability: "image"
    image_endpoint: "/image_generation"
    model: "image-01"
    timeout_seconds: 120
    client_timeout_seconds: 180
    max_retries: 2
    max_concurrency: 5
    env_key: "MINIMAX_API_KEY"

  # DeepSeek V4 workers — all share DEEPSEEK_API_KEY.
  # Concurrency semaphore is keyed on env_key, so the pool is shared across
  # all three variants. Set max_concurrency conservatively; thinking mode is
  # significantly slower than instant mode.
  #
  # Routing guide:
  #   deepseek-flash        → bulk refactors, doc gen, multi-file, latency-sensitive
  #   deepseek-pro          → precision edits, quality-sensitive, targeted logic
  #   deepseek-pro-thinking → complex bugs, architectural reasoning, API-sensitive code
  deepseek-flash:
    provider: "deepseek"
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-flash"
    env_key: "DEEPSEEK_API_KEY"
    max_tokens: 8192
    temperature: 0.3
    max_output_lines: 1000
    client_timeout_seconds: 300
    max_retries: 2
    max_concurrency: 15
    capability: "text"

  deepseek-pro:
    provider: "deepseek"
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-pro"
    env_key: "DEEPSEEK_API_KEY"
    max_tokens: 8192
    temperature: 0.3
    max_output_lines: 1000
    client_timeout_seconds: 600
    max_retries: 2
    max_concurrency: 5
    capability: "text"

  deepseek-pro-thinking:
    provider: "deepseek"
    base_url: "https://api.deepseek.com"
    model: "deepseek-v4-pro"
    env_key: "DEEPSEEK_API_KEY"
    max_tokens: 32768
    # DeepSeek thinking mode rejects temperature and top_p — omit_temperature
    # instructs WorkerProfile to exclude both from the chat.completions call.
    omit_temperature: true
    max_output_lines: 2000
    client_timeout_seconds: 900
    max_retries: 2
    max_concurrency: 2
    extra_body: {"thinking": {"type": "enabled", "reasoning_effort": "max"}}
    capability: "text"
